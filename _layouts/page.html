---
layout: default
---

<div class="page clearfix" post>
    <div class="left">
        <h1>{{page.title}}</h1>
        <hr>
        {{content}}
    </div>
    <button class="anchor" type="button" aria-label="打开页面目录" aria-controls="content-side" aria-expanded="false"><i class="fa fa-anchor" aria-hidden="true"></i></button>
    <div class="right">
        <div class="wrap">

            <!-- Content -->
            <div class="side content">
                <div>
                    内容
                </div>
                <ul id="content-side" class="content-ul">
                </ul>
            </div>
            <!-- 其他div框放到这里 -->
            <!-- <div class="side">bbbb</div> -->

        </div>
    </div>
</div>
<script src="{{ '/js/pageContent.js' | relative_url }}" charset="utf-8"></script>
